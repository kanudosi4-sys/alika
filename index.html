<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>ორი ნაპირი - საინჟინრო კალკულატორი</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            position: relative;
            border-top: 5px solid #2c3e50;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            font-size: 11px;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .res-box {
            padding: 15px;
            border-radius: 8px;
            background: #fdfdfd;
            border-left: 5px solid #3498db;
            margin-top: 10px;
            border: 1px solid #eee;
            border-left-width: 5px;
        }

        .total-line {
            font-size: 16px;
            font-weight: bold;
            color: #c0392b;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        .grand-total {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: right;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <div class="logo-section">
                <div class="logo-text">ორი ნაპირი</div>
                <div style="color: #7f8c8d; font-size: 14px;">საინჟინრო კალკულატორი</div>
            </div>
        </div>

        <div class="card no-print">
            <h3 style="color:#2980b9; margin-top:0;">🔗 არმატურა</h3>
            <div class="grid">
                <div><label>დიამეტრი (Ø)</label>
                    <select id="rDia" onchange="calc()">
                        <option value="0.222">6 მმ</option>
                        <option value="0.395">8 მმ</option>
                        <option value="0.617">10 მმ</option>
                        <option value="0.888" selected>12 მმ</option>
                        <option value="1.21">14 მმ</option>
                        <option value="1.58">16 მმ</option>
                        <option value="2.47">20 მმ</option>
                        <option value="3.85">25 მმ</option>
                    </select>
                </div>
                <div><label>წონა (კგ)</label><input type="number" id="rKG" value="1000" oninput="calc()"></div>
                <div><label>ტონის ფასი (₾)</label><input type="number" id="rPrice" value="2400" oninput="calc()"></div>
            </div>
            <div class="res-box">
                <span>სიგრძე: <span id="rLen">0</span> მ.</span>
                <div class="total-line">
                    <span>ჯამი: <span id="rSum">0</span> ₾</span>
                    <button class="add-btn" style="background:#2980b9"
                        onclick="add('არმატურა', 'rKG', 'rSum', '0', 'კგ')">დამატება</button>
                </div>
            </div>
        </div>

        <div class="card no-print">
            <h3 style="color:#e67e22; margin-top:0;">⚪ ბეტონი</h3>
            <div class="grid">
                <div><label>მოცულობა (მ³)</label><input type="number" id="cV" value="1" oninput="calc()"></div>
                <div><label>მარკა</label>
                    <select id="cMark" onchange="calc()">
                        <option value="220" data-s="800" data-g="1100">M100</option>
                        <option value="250" data-s="750" data-g="1150">M150</option>
                        <option value="300" data-s="700" data-g="1200">M200</option>
                        <option value="350" data-s="650" data-g="1250">M250</option>
                        <option value="400" data-s="600" data-g="1300" selected>M300</option>
                        <option value="450" data-s="550" data-g="1350">M350</option>
                    </select>
                </div>
                <div><label>ხელობა (1მ³)</label><input type="number" id="cWP" value="170" oninput="calc()"></div>
            </div>
            <div class="res-box" style="border-left-color: #e67e22;">
                <div class="total-line">
                    <div style="font-size: 13px;">მასალა: <span id="cMatSum">0</span> | ხელობა: <span
                            id="cWorkSum">0</span></div>
                    <button class="add-btn" style="background:#e67e22"
                        onclick="add('ბეტონი', 'cV', 'cMatSum', 'cWorkSum', 'მ³')">დამატება</button>
                </div>
            </div>
        </div>

        <div class="card no-print">
            <h3 style="color:#8e44ad; margin-top:0;">🧱 ბლოკი</h3>
            <div class="grid">
                <div><label>ფართობი (მ²)</label><input type="number" id="bS" value="10" oninput="calc()"></div>
                <div><label>ზომა</label>
                    <select id="bSize" onchange="calc()">
                        <option value="1.20">10-იანი (1.20₾)</option>
                        <option value="1.60" selected>20-იანი (1.60₾)</option>
                        <option value="2.10">30-იანი (2.10₾)</option>
                    </select>
                </div>
                <div><label>ხელობა (ცალზე)</label><input type="number" id="bWork" value="1.50" oninput="calc()"></div>
            </div>
            <div class="res-box" style="border-left-color: #8e44ad;">
                <div class="total-line">
                    <div style="font-size: 13px;">მასალა: <span id="bMatSum">0</span> | ხელობა: <span
                            id="bWorkSum">0</span></div>
                    <button class="add-btn" style="background:#8e44ad"
                        onclick="add('ბლოკი', 'bS', 'bMatSum', 'bWorkSum', 'მ²')">დამატება</button>
                </div>
            </div>
        </div>

        <div class="card no-print">
            <h3 style="color:#27ae60; margin-top:0;">📐 ლესვა და სტიაშკა</h3>
            <div class="grid">
                <div><label>ფართობი (მ²)</label><input type="number" id="lS" value="100" oninput="calc()"></div>
                <div><label>სისქე (სმ)</label><input type="number" id="lThick" value="5" oninput="calc()"></div>
                <div><label>ხელობა (მ²)</label><input type="number" id="lWork" value="15" oninput="calc()"></div>
            </div>
            <div class="res-box" style="border-left-color: #27ae60;">
                <div class="total-line">
                    <div style="font-size: 13px;">მასალა: <span id="lMatSum">0</span> | ხელობა: <span
                            id="lWorkSum">0</span></div>
                    <button class="add-btn" style="background:#27ae60"
                        onclick="add('ლესვა/სტიაშკა', 'lS', 'lMatSum', 'lWorkSum', 'მ²')">დამატება</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>📊 რეესტრი</h3>
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>დასახელება</th>
                        <th>რაოდენობა</th>
                        <th>მასალა</th>
                        <th>ხელობა</th>
                        <th>ჯამი</th>
                        <th class="no-print"></th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
            <div class="grand-total">სულ: <span id="grand">0</span> ₾</div>
        </div>
    </div>

    <script>
        function calc() {
            // არმატურა
            let rd = parseFloat(document.getElementById('rDia').value);
            let rk = parseFloat(document.getElementById('rKG').value) || 0;
            let rp = parseFloat(document.getElementById('rPrice').value) || 0;
            document.getElementById('rLen').innerText = (rk / rd).toFixed(1);
            document.getElementById('rSum').innerText = Math.round((rk / 1000) * rp);

            // ბეტონი
            let cv = parseFloat(document.getElementById('cV').value) || 0;
            let cSel = document.getElementById('cMark').selectedOptions[0];
            let ck = parseFloat(cSel.value), sk = parseFloat(cSel.dataset.s), gk = parseFloat(cSel.dataset.g);
            document.getElementById('cMatSum').innerText = Math.round(cv * ((ck * 0.32) + (sk * 0.06) + (gk * 0.032)));
            document.getElementById('cWorkSum').innerText = Math.round(cv * parseFloat(document.getElementById('cWP').value));

            // ბლოკი
            let bs = parseFloat(document.getElementById('bS').value) || 0;
            let bc = Math.ceil(bs * 12.5);
            document.getElementById('bMatSum').innerText = Math.round(bc * parseFloat(document.getElementById('bSize').value));
            document.getElementById('bWorkSum').innerText = Math.round(bc * parseFloat(document.getElementById('bWork').value));

            // ლესვა/სტიაშკა (ფორმულა: ცემენტი 3.6კგ, ქვიშა 0.012მ3 თითო სმ-ზე 1მ2-ზე)
            let ls = parseFloat(document.getElementById('lS').value) || 0;
            let lt = parseFloat(document.getElementById('lThick').value) || 0;
            let lMat = (ls * lt * 3.6 * 0.32) + (ls * lt * 0.012 * 60);
            document.getElementById('lMatSum').innerText = Math.round(lMat);
            document.getElementById('lWorkSum').innerText = Math.round(ls * parseFloat(document.getElementById('lWork').value));
        }

        function add(name, qId, mId, wId, unit) {
            let q = document.getElementById(qId).value, m = parseInt(document.getElementById(mId).innerText), w = parseInt(document.getElementById(wId).innerText);
            document.getElementById('list').innerHTML += `<tr><td><b>${name}</b></td><td>${q} ${unit}</td><td>${m} ₾</td><td>${w} ₾</td><td><b>${m + w} ₾</b></td><td class="no-print" onclick="this.parentElement.remove(); tot();" style="color:red; cursor:pointer;">✕</td></tr>`;
            tot();
        }

        function tot() {
            let s = 0;
            document.querySelectorAll('#list tr').forEach(r => s += parseInt(r.cells[4].innerText));
            document.getElementById('grand').innerText = s;
        }
        window.onload = calc;
    </script>
</body>

</html>
