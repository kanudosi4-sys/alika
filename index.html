<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>სამშენებლო პორტალი</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .container {
            max-width: 800px;
            width: 95%;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            text-align: center;
        }

        #clock {
            font-size: 24px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 10px;
        }

        .calc-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .profile-img {
            width: 250px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .result-box {
            background: #fff3e0;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            border-left: 6px solid #e67e22;
        }

        .highlight {
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1em;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>საინჟინრო-სამშენებლო პორტალი 🏗️</h1>
    </div>

    <div class="container">
        <div class="card">
            <div id="clock">00:00:00</div>
            <img src="New DOC Document.jpg" class="profile-img" alt="პროექტი">
            <h2>ორი ნაპირი</h2>
        </div>

        <div class="card">
            <h3 style="color: #e67e22;">ბეტონის საინჟინრო კალკულატორი (180₾ / მ³)</h3>

            <div class="calc-group">
                <div>
                    <label>სიგრძე (მ)</label>
                    <input type="number" id="L" value="1" oninput="calculate()">
                </div>
                <div>
                    <label>სიგანე (მ)</label>
                    <input type="number" id="W" value="1" oninput="calculate()">
                </div>
                <div>
                    <label>სისქე (მ)</label>
                    <input type="number" id="H" value="0.2" oninput="calculate()">
                </div>
            </div>

            <div class="result-box">
                <p>🟦 ფართობი: <span id="sq-res" class="highlight">1.00</span> მ²</p>
                <p>📐 მოცულობა: <span id="vol-res" class="highlight">0.20</span> მ³</p>
                <p>⚖️ ცემენტი (370კგ/მ³): <span id="cem-kg-res" class="highlight" style="color: #d35400;">74.0</span> კგ
                </p>
                <p>⏳ ქვიშა/ხრეში (1.2): <span id="agg-res" class="highlight">0.24</span> მ³</p>
                <hr style="border: 0.5px solid #ddd;">
                <h2 style="color: #c0392b; margin: 10px 0 0 0;">ჯამური ფასი: <span id="price-res">36</span> ₾</h2>
            </div>
        </div>
    </div>

    <script>
        // 1. საათის ფუნქცია
        function updateClock() {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            if (clockEl) clockEl.innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. გამოთვლის ფუნქცია
        function calculate() {
            let l = parseFloat(document.getElementById('L').value) || 0;
            let w = parseFloat(document.getElementById('W').value) || 0;
            let h = parseFloat(document.getElementById('H').value) || 0;

            // ფორმულები
            let area = l * w;
            let volume = area * h;
            let cementKg = volume * 370;
            let aggregates = volume * 1.2;
            let totalPrice = volume * 180;

            // შედეგების ჩაწერა ეკრანზე
            document.getElementById('sq-res').innerText = area.toFixed(2);
            document.getElementById('vol-res').innerText = volume.toFixed(2);
            document.getElementById('cem-kg-res').innerText = cementKg.toFixed(1);
            document.getElementById('agg-res').innerText = aggregates.toFixed(2);
            document.getElementById('price-res').innerText = Math.round(totalPrice);
        }

        // პირველადი გამოთვლა ჩატვირთვისას
        window.onload = calculate;
    </script>

</body>

</html>
