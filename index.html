<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>სამშენებლო პორტალი</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-bottom: 50px;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            width: 95%;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        #clock {
            font-size: 24px;
            font-weight: bold;
            color: #e67e22;
            text-align: center;
            margin-bottom: 10px;
        }

        .calc-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .result-box {
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 6px solid;
        }

        .concrete-res {
            background: #fff3e0;
            border-left-color: #e67e22;
        }

        .rebar-res {
            background: #e1f5fe;
            border-left-color: #0288d1;
        }

        .add-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }

        /* ცხრილის სტილი */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        .total-row {
            background: #ecf0f1;
            font-weight: bold;
        }

        .delete-btn {
            color: #e74c3c;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>საინჟინრო-სამშენებლო პორტალი 🏗️</h1>
    </div>

    <div class="container">
        <div class="card" style="text-align: center;">
            <div id="clock">00:00:00</div>
            <img src="New DOC Document.jpg" style="width:220px; border-radius:12px; border: 2px solid #eee;" alt="ლოგო">
            <h2 style="margin-top:10px;">ორი ნაპირი</h2>
        </div>

        <div class="card">
            <h3 style="color: #e67e22; margin-top:0;">ბეტონი (180₾ / მ³)</h3>
            <div class="calc-group">
                <div><label>დასახელება</label><input type="text" id="cName" value="ფილა"></div>
                <div><label>სიგრძე (მ)</label><input type="number" id="L" value="1" oninput="calculate()"></div>
                <div><label>სიგანე (მ)</label><input type="number" id="W" value="1" oninput="calculate()"></div>
                <div><label>სისქე (მ)</label><input type="number" id="H" value="0.2" oninput="calculate()"></div>
            </div>
            <div class="result-box concrete-res">
                <p>📐 მოცულობა: <b><span id="vol-res">0.20</span> მ³</b> | ცემენტი: <b><span id="cem-kg-res">74.0</span>
                        კგ</b></p>
                <p>💰 ფასი: <b><span id="price-res">36</span> ₾</b></p>
                <button class="add-btn" onclick="addToTable('concrete')">სიაში დამატება +</button>
            </div>
        </div>

        <div class="card">
            <h3 style="color: #0288d1; margin-top:0;">არმატურა (2400₾ / ტონა)</h3>
            <div class="calc-group">
                <div><label>დასახელება</label><input type="text" id="rName" value="კოლონა"></div>
                <div>
                    <label>დიამეტრი</label>
                    <select id="dia" onchange="calculate()">
                        <option value="0.395">8 მმ</option>
                        <option value="0.617">10 მმ</option>
                        <option value="0.888" selected>12 მმ</option>
                        <option value="1.21">14 მმ</option>
                        <option value="1.58">16 მმ</option>
                        <option value="2.47">20 მმ</option>
                    </select>
                </div>
                <div><label>სულ მეტრი</label><input type="number" id="rebarL" value="10" oninput="calculate()"></div>
            </div>
            <div class="result-box rebar-res">
                <p>⚖️ წონა: <b><span id="res-weight">8.88</span> კგ</b> | 💰 ფასი: <b><span id="rebar-cost">21</span>
                        ₾</b></p>
                <button class="add-btn" style="background:#3498db;" onclick="addToTable('rebar')">სიაში დამატება
                    +</button>
            </div>
        </div>

        <div class="card">
            <h3 style="border:none;">📑 ხარჯთაღრიცხვის ცხრილი</h3>
            <table>
                <thead>
                    <tr>
                        <th>დასახელება</th>
                        <th>ტიპი</th>
                        <th>რაოდენობა</th>
                        <th>ფასი (₾)</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="estimate-body">
                </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="3">სულ ჯამი:</td>
                        <td id="grand-total">0</td>
                        <td>₾</td>
                    </tr>
                </tfoot>
            </table>
            <button onclick="window.print()" style="margin-top:15px; width:100%; padding:10px; cursor:pointer;">🖨️
                ამობეჭდვა / PDF</button>
        </div>
    </div>

    <script>
        function updateClock() {
            const clockEl = document.getElementById('clock');
            if (clockEl) clockEl.innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        let totalSum = 0;

        function calculate() {
            // ბეტონი
            let l = parseFloat(document.getElementById('L').value) || 0;
            let w = parseFloat(document.getElementById('W').value) || 0;
            let h = parseFloat(document.getElementById('H').value) || 0;
            let vol = l * w * h;
            document.getElementById('vol-res').innerText = vol.toFixed(2);
            document.getElementById('cem-kg-res').innerText = (vol * 370).toFixed(1);
            document.getElementById('price-res').innerText = Math.round(vol * 180);

            // არმატურა
            let coeff = parseFloat(document.getElementById('dia').value);
            let m = parseFloat(document.getElementById('rebarL').value) || 0;
            let kg = m * coeff;
            document.getElementById('res-weight').innerText = kg.toFixed(2);
            document.getElementById('rebar-cost').innerText = Math.round((kg / 1000) * 2400);
        }

        function addToTable(type) {
            const tbody = document.getElementById('estimate-body');
            const row = document.createElement('tr');
            let name, info, price;

            if (type === 'concrete') {
                name = document.getElementById('cName').value;
                info = document.getElementById('vol-res').innerText + " მ³ (ბეტონი)";
                price = parseInt(document.getElementById('price-res').innerText);
            } else {
                name = document.getElementById('rName').value;
                info = document.getElementById('res-weight').innerText + " კგ (არმატურა)";
                price = parseInt(document.getElementById('rebar-cost').innerText);
            }

            row.innerHTML = `
                <td>${name}</td>
                <td>${info}</td>
                <td>1</td>
                <td>${price}</td>
                <td><button class="delete-btn" onclick="removeRow(this, ${price})">❌</button></td>
            `;

            tbody.appendChild(row);
            totalSum += price;
            document.getElementById('grand-total').innerText = totalSum;
        }

        function removeRow(btn, price) {
            btn.parentElement.parentElement.remove();
            totalSum -= price;
            document.getElementById('grand-total').innerText = totalSum;
        }

        window.onload = calculate;
    </script>
</body>

</html>
