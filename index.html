<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>სამშენებლო პორტალი</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 0 0 15px 15px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        #clock {
            font-size: 28px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 10px;
        }

        .calc-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            text-align: left;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .result-box {
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            border-left: 6px solid;
        }

        .concrete-res {
            background: #fff3e0;
            border-left-color: #e67e22;
        }

        .rebar-res {
            background: #e1f5fe;
            border-left-color: #0288d1;
        }

        .logo {
            width: 200px;
            border-radius: 10px;
            margin: 15px 0;
            border: 2px solid #eee;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>საინჟინრო-სამშენებლო პორტალი 🏗️</h1>
    </div>

    <div class="card">
        <div id="clock">00:00:00</div>
        <img src="New DOC Document.jpg" class="logo" alt="ლოგო">
        <h2>ორი ნაპირი</h2>
    </div>

    <div class="card">
        <h3 style="color: #e67e22;">ბეტონის კალკულატორი (180₾ / მ³)</h3>
        <div class="calc-group">
            <div><label>სიგრძე (მ)</label><input type="number" id="L" value="1" oninput="calcAll()"></div>
            <div><label>სიგანე (მ)</label><input type="number" id="W" value="1" oninput="calcAll()"></div>
            <div><label>სისქე (მ)</label><input type="number" id="H" value="0.2" oninput="calcAll()"></div>
        </div>
        <div class="result-box concrete-res">
            <p>🟦 ფართობი: <b><span id="sq-res">1.00</span> მ²</b></p>
            <p>📐 მოცულობა: <b><span id="vol-res">0.20</span> მ³</b></p>
            <p>⚖️ ცემენტი (370კგ/მ³): <b><span id="cem-res">74.0</span> კგ</b></p>
            <h3 style="margin: 10px 0 0 0; color: #c0392b;">ფასი: <span id="p-res">36</span> ₾</h3>
        </div>
    </div>

    <div class="card">
        <h3 style="color: #0288d1;">არმატურის კალკულატორი ⛓️</h3>
        <div class="calc-group">
            <div>
                <label>დიამეტრი</label>
                <select id="dia" onchange="calcAll()">
                    <option value="0.395">8 მმ</option>
                    <option value="0.617">10 მმ</option>
                    <option value="0.888" selected>12 მმ</option>
                    <option value="1.21">14 მმ</option>
                    <option value="1.58">16 მმ</option>
                    <option value="2.47">20 მმ</option>
                </select>
            </div>
            <div><label>სულ მეტრი</label><input type="number" id="rL" value="10" oninput="calcAll()"></div>
            <div><label>სულ კილოგრამი</label><input type="number" id="rKG" value="8.88" oninput="calcRev()"></div>
        </div>
        <div class="result-box rebar-res">
            <p>⚖️ ჯამური წონა: <b><span id="res-kg">8.88</span> კგ</b></p>
            <p>📏 ჯამური სიგრძე: <b><span id="res-m">10.00</span> მ</b></p>
            <h3 style="margin: 10px 0 0 0; color: #c0392b;">ღირებულება (2400₾/ტ): <span id="res-cost">21</span> ₾</h3>
        </div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function calcAll() {
            // ბეტონი
            let l = parseFloat(document.getElementById('L').value) || 0;
            let w = parseFloat(document.getElementById('W').value) || 0;
            let h = parseFloat(document.getElementById('H').value) || 0;
            let vol = l * w * h;
            document.getElementById('sq-res').innerText = (l * w).toFixed(2);
            document.getElementById('vol-res').innerText = vol.toFixed(2);
            document.getElementById('cem-res').innerText = (vol * 370).toFixed(1);
            document.getElementById('p-res').innerText = Math.round(vol * 180);

            // არმატურა
            let coeff = parseFloat(document.getElementById('dia').value);
            let m = parseFloat(document.getElementById('rL').value) || 0;
            let kg = m * coeff;
            document.getElementById('res-kg').innerText = kg.toFixed(2);
            document.getElementById('res-m').innerText = m.toFixed(2);
            document.getElementById('rKG').value = kg.toFixed(2);
            document.getElementById('res-cost').innerText = Math.round((kg / 1000) * 2400);
        }

        function calcRev() {
            let coeff = parseFloat(document.getElementById('dia').value);
            let kg = parseFloat(document.getElementById('rKG').value) || 0;
            let m = kg / coeff;
            document.getElementById('res-m').innerText = m.toFixed(2);
            document.getElementById('res-kg').innerText = kg.toFixed(2);
            document.getElementById('rL').value = m.toFixed(2);
            document.getElementById('res-cost').innerText = Math.round((kg / 1000) * 2400);
        }

        window.onload = calcAll;
    </script>
</body>

</html>
