<!DOCTYPE html>
<html>

<head>
    <title>ჩემი საიტი</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            /* ანიმაციის პარამეტრები */
            animation: fadeInAnimation ease 3s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
        }

        @keyframes fadeInAnimation {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        img {
            width: 300px;
            /* ფოტო გახდება მრგვალი */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: transform .2s;
            /* მიტანის ეფექტისთვის */
        }

        img:hover {
            transform: scale(1.1);
            /* მაუსის მიტანისას ფოტო გაიზრდება */
        }

        h1 {
            color: #2c3e50;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div id="clock"
        style="font-size: 20px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; background: white;">
        00:00:00
    </div>

    <img src="New DOC Document.jpg" alt="ჩემი ფოტო">
    <h1>მოგესალმებით ჩემს საიტზე!</h1>
    <p>ეს საიტი ანიმაციურია ✨</p>

    <div style="margin-top: 20px;">
        <button onclick="changeColor()"
            style="padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 30px; border: none; background-color: #2c3e50; color: white; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            შეცვალე ფონი ✨
        </button>
    </div>

    <script>
        // საათის ფუნქცია
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            document.getElementById('clock').innerText = timeString;
        }
        setInterval(updateClock, 1000); // განახლება ყოველ წამს
        updateClock(); // პირველივე ჩატვირთვისას გამოჩენა

        // ფერის შეცვლის ფუნქცია
        function changeColor() {
            const colors = ['#f0f8ff', '#e6e6fa', '#ffe4e1', '#fafad2', '#d8bfd8', '#f5f5dc', '#e0ffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.backgroundColor = randomColor;
        }
    </script>

</body>



</html>
<div style="margin-top: 40px; padding: 20px; border-top: 2px solid #2c3e50; width: 80%; max-width: 400px;">
    <h3>მოგვწერეთ:</h3>
    <input type="text" id="userName" placeholder="თქვენი სახელი"
        style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
    <textarea id="userMsg" placeholder="შეტყობინება"
        style="width: 100%; padding: 10px; height: 80px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
    <button onclick="sendMessage()"
        style="width: 100%; margin-top: 10px; padding: 10px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer;">გაგზავნა
        🚀</button>
    <p id="responseMsg" style="color: #27ae60; font-weight: bold; margin-top: 10px;"></p>
</div>

<script>
    // შეტყობინების გაგზავნის ფუნქცია
    function sendMessage() {
        const name = document.getElementById('userName').value;
        const msg = document.getElementById('userMsg').value;
        const response = document.getElementById('responseMsg');

        if (name && msg) {
            response.innerText = "მადლობა " + name + ", თქვენი შეტყობინება მიღებულია!";
            // ველების გასუფთავება
            document.getElementById('userName').value = "";
            document.getElementById('userMsg').value = "";
        } else {
            response.style.color = "red";
            response.innerText = "გთხოვთ, შეავსოთ ორივე ველი!";
        }
    }
</script>
