<!DOCTYPE html>
<html>

<head>
    <title>ჩემი საიტი</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            /* ანიმაციის პარამეტრები */
            animation: fadeInAnimation ease 3s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
        }

        @keyframes fadeInAnimation {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        img {
            width: 300px;
            /* ფოტო გახდება მრგვალი */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: transform .2s;
            /* მიტანის ეფექტისთვის */
        }

        img:hover {
            transform: scale(1.1);
            /* მაუსის მიტანისას ფოტო გაიზრდება */
        }

        h1 {
            color: #2c3e50;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div id="clock"
        style="font-size: 20px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; background: white;">
        00:00:00
    </div>

    <img src="New DOC Document.jpg" alt="ჩემი ფოტო">
    <h1>მოგესალმებით ჩემს საიტზე!</h1>
    <p>ეს საიტი ანიმაციურია ✨</p>

    <div style="margin-top: 20px;">
        <button onclick="changeColor()"
            style="padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 30px; border: none; background-color: #2c3e50; color: white; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            შეცვალე ფონი ✨
        </button>
    </div>

    <script>
        // საათის ფუნქცია
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            document.getElementById('clock').innerText = timeString;
        }
        setInterval(updateClock, 1000); // განახლება ყოველ წამს
        updateClock(); // პირველივე ჩატვირთვისას გამოჩენა

        // ფერის შეცვლის ფუნქცია
        function changeColor() {
            const colors = ['#f0f8ff', '#e6e6fa', '#ffe4e1', '#fafad2', '#d8bfd8', '#f5f5dc', '#e0ffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.backgroundColor = randomColor;
        }
    </script>

</body>



</html>
<div class="card">
    <h2>ბეტონის სრული კალკულატორი (B25 მარკა)</h2>
    <div class="calc-group">
        <div>
            <label>სიგრძე (მ)</label><br>
            <input type="number" id="L" value="1" step="0.1">
        </div>
        <div>
            <label>სიგანე (მ)</label><br>
            <input type="number" id="W" value="1" step="0.1">
        </div>
        <div>
            <label>სისქე (მ)</label><br>
            <input type="number" id="H" value="0.2" step="0.01">
        </div>
    </div>

    <button onclick="calculateFull()">დეტალური გამოთვლა</button>

    <div id="detailed-result"
        style="margin-top: 20px; display: none; background: #f9f9f9; padding: 15px; border-left: 5px solid #e67e22;">
        <h4 style="margin: 0 0 10px 0;">შედეგი:</h4>
        <p>📐 ჯამური მოცულობა: <span id="vol-res">0</span> მ³</p>
        <p>📦 ცემენტი (50კგ): <span id="cem-res">0</span> ტომარა</p>
        <p>⏳ ქვიშა/ღორღი: <span id="agg-res">0</span> მ³</p>
        <hr>
        <h3 style="color: #c0392b;">ჯამური სავარაუდო ფასი: <span id="price-res">0</span> ₾</h3>
    </div>
</div>

<script>
    function calculateFull() {
        // მონაცემების წაკითხვა
        let l = parseFloat(document.getElementById('L').value) || 0;
        let w = parseFloat(document.getElementById('W').value) || 0;
        let h = parseFloat(document.getElementById('H').value) || 0;

        // 1. მოცულობის გამოთვლა
        let volume = l * w * h;

        // 2. მასალების დათვლა (საშუალოდ B25 მარკისთვის 1მ³-ზე მიდის 7-8 ტომარა ცემენტი)
        let cementBags = Math.ceil(volume * 7.5);
        let aggregates = volume * 1.2; // დანაკარგის გათვალისწინებით

        // 3. ფასის დათვლა (ცემენტი ~15₾, ბეტონი საშუალოდ 210₾ მ³)
        let totalPrice = volume * 210;

        // შედეგების გამოჩენა
        document.getElementById('vol-res').innerText = volume.toFixed(2);
        document.getElementById('cem-res').innerText = cementBags;
        document.getElementById('agg-res').innerText = aggregates.toFixed(2);
        document.getElementById('price-res').innerText = totalPrice.toFixed(0);

        document.getElementById('detailed-result').style.display = 'block';
    }
</script>
