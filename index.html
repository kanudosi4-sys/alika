<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>სამშენებლო პორტალი</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            transition: background-color 0.5s;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .container {
            max-width: 800px;
            width: 95%;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            text-align: center;
        }

        #clock {
            font-size: 24px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 15px;
        }

        .calc-group {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            width: 80px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background-color: #e67e22;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #d35400;
        }

        .profile-img {
            width: 250px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        #detailed-result {
            background: #fff3e0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>საინჟინრო-სამშენებლო პორტალი 🏗️</h1>
    </div>

    <div class="container">
        <div class="card">
            <div id="clock">00:00:00</div>
            <p>მიმდინარე დრო</p>
        </div>

        <div class="card">
            <img src="New DOC Document.jpg" class="profile-img" alt="პროექტი">
            <h2>ორი ნაპირი</h2>
            <button onclick="changeBg()">შეცვალე ფონი ✨</button>
        </div>

        <div class="card">
            <h3>ბეტონის ხარჯის დათვლა (180₾ / მ³)</h3>
            <div class="calc-group">
                <div><label>სიგრძე</label><br><input type="number" id="L" value="1"></div>
                <div><label>სიგანე</label><br><input type="number" id="W" value="1"></div>
                <div><label>სისქე</label><br><input type="number" id="H" value="0.2"></div>
            </div>
            <button onclick="calculateFull()">დეტალური გამოთვლა</button>

            <div id="detailed-result">
                <p>📐 მოცულობა: <span id="vol-res">0</span> მ³</p>
                <p>📦 ცემენტი (370კგ): <span id="cem-res">0</span> ტომარა</p>
                <p>⏳ ქვიშა/ხრეში: <span id="agg-res">0</span> მ³</p>
                <h3 style="color: #c0392b;">ჯამური ფასი: <span id="price-res">0</span> ₾</h3>
            </div>
        </div>
    </div>

    <script>
        // 1. საათის ფუნქცია
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. ფონის შეცვლა
        function changeBg() {
            const colors = ['#f4f7f6', '#e8f4f8', '#fdf2e9', '#f4ecf7'];
            document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        }

        // 3. კალკულატორი შენი ფორმულით
        function calculateFull() {
            let l = parseFloat(document.getElementById('L').value) || 0;
            let w = parseFloat(document.getElementById('W').value) || 0;
            let h = parseFloat(document.getElementById('H').value) || 0;

            let volume = l * w * h;
            let cementBags = Math.ceil(volume * 7.4);
            let aggregates = volume * 1.2;
            let totalPrice = volume * 180;

            document.getElementById('vol-res').innerText = volume.toFixed(2);
            document.getElementById('cem-res').innerText = cementBags;
            document.getElementById('agg-res').innerText = aggregates.toFixed(2);
            document.getElementById('price-res').innerText = totalPrice.toFixed(0);

            document.getElementById('detailed-result').style.display = 'block';
        }
    </script>

</body>

</html>
