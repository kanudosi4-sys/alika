<!DOCTYPE html>
<html>

<head>
    <title>ჩემი საიტი</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            /* ანიმაციის პარამეტრები */
            animation: fadeInAnimation ease 3s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
        }

        @keyframes fadeInAnimation {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        img {
            width: 300px;
            border-radius: 50%;
            /* ფოტო გახდება მრგვალი */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: transform .2s;
            /* მიტანის ეფექტისთვის */
        }

        img:hover {
            transform: scale(1.1);
            /* მაუსის მიტანისას ფოტო გაიზრდება */
        }

        h1 {
            color: #2c3e50;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <img src="New DOC Document.jpg" alt="ჩემი ფოტო">
    <h1>მოგესალმებით ჩემს საიტზე!</h1>
    <p>ეს საიტი ანიმაციურია ✨</p><button onclick="changeColor()"
        style="margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background-color: #2c3e50; color: white; transition: 0.3s;">
        შეცვალე ფონი ✨
    </button>

    <script>
        function changeColor() {
            // ფერების მასივი
            const colors = ['#f0f8ff', '#e6e6fa', '#ffe4e1', '#fafad2', '#d8bfd8', '#f5f5dc'];
            // ვირჩევთ შემთხვევით ფერს
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            // ვცვლით საიტის ფონს
            document.body.style.backgroundColor = randomColor;
        }
    </script>
</body>

</html>
