<div class="card">
    <h3 style="color: #8e44ad; margin-top:0; border-bottom: 2px solid #f5eef8;">ბლოკის გაანგარიშება 🧱</h3>
    <div class="calc-group">
        <div><label>კედლის ფართობი (მ²)</label><input type="number" id="wallSq" value="10" oninput="calculateBlock()">
        </div>
        <div>
            <label>ბლოკის ზომა</label>
            <select id="blockSize" onchange="calculateBlock()">
                <option value="12.5">20x40 (12.5 ცალი/მ²)</option>
                <option value="12.5">15x40 (12.5 ცალი/მ²)</option>
                <option value="12.5">10x40 (12.5 ცალი/მ²)</option>
                <option value="25">20x20 (25 ცალი/მ²)</option>
            </select>
        </div>
        <div><label>ბლოკის ფასი (₾)</label><input type="number" id="blockPrice" value="1.50" oninput="calculateBlock()">
        </div>
        <div><label>გამოსაკლები (კარი/ფანჯ. მ²)</label><input type="number" id="minusSq" value="0"
                oninput="calculateBlock()"></div>
    </div>
    <div class="result-box" style="background: #f5eef8; border-left-color: #8e44ad;">
        <p>🧱 საჭირო რაოდენობა: <b><span id="res-blocks">0</span> ცალი</b></p>
        <p>📏 სუფთა ფართობი: <b><span id="net-sq">0</span> მ²</b></p>
        <h3 style="color: #c0392b; margin: 10px 0 0 0;">💰 ბლოკის ღირებულება: <span id="block-cost">0</span> ₾</h3>
        <button class="add-btn" style="background:#8e44ad;" onclick="addToTable('block')">სიაში დამატება +</button>
    </div>
</div>

<script>
    // დაამატე ეს ფუნქცია არსებულ სკრიპტში
    function calculateBlock() {
        let wallSq = parseFloat(document.getElementById('wallSq').value) || 0;
        let minusSq = parseFloat(document.getElementById('minusSq').value) || 0;
        let perSq = parseFloat(document.getElementById('blockSize').value);
        let bPrice = parseFloat(document.getElementById('blockPrice').value) || 0;

        let netSq = wallSq - minusSq;
        if (netSq < 0) netSq = 0;

        let totalBlocks = Math.ceil(netSq * perSq);
        let totalCost = totalBlocks * bPrice;

        document.getElementById('net-sq').innerText = netSq.toFixed(2);
        document.getElementById('res-blocks').innerText = totalBlocks;
        document.getElementById('block-cost').innerText = totalCost.toFixed(0);
    }

    // ასევე განაახლე addToTable ფუნქცია, რომ ბლოკიც ჩაწეროს
    function addToTable(type) {
        const tbody = document.getElementById('estimate-body');
        const row = document.createElement('tr');
        let name, info, price;

        if (type === 'concrete') {
            name = document.getElementById('cName').value;
            info = document.getElementById('vol-res').innerText + " მ³ ბეტონი";
            price = parseInt(document.getElementById('price-res').innerText);
        } else if (type === 'rebar') {
            name = document.getElementById('rName').value;
            info = document.getElementById('res-weight').innerText + " კგ არმატურა";
            price = parseInt(document.getElementById('rebar-cost').innerText);
        } else if (type === 'block') {
            name = "ბლოკის წყობა";
            info = document.getElementById('res-blocks').innerText + " ცალი ბლოკი";
            price = parseInt(document.getElementById('block-cost').innerText);
        }

        row.innerHTML = `<td>${name}</td><td>${info}</td><td>${price}</td><td><button style="color:red; cursor:pointer; border:none; background:none; font-weight:bold;" onclick="removeRow(this, ${price})">✕</button></td>`;
        tbody.appendChild(row);
        totalSum += price;
        document.getElementById('grand-total').innerText = totalSum;
    }
</script>
