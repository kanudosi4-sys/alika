<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>სამშენებლო პორტალი</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            width: 95%;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            text-align: center;
        }

        #clock {
            font-size: 24px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 10px;
        }

        .calc-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .result-box {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            border-left: 6px solid #3498db;
        }

        .highlight {
            font-weight: bold;
            color: #2c3e50;
        }

        .concrete-res {
            background: #fff3e0;
            border-left-color: #e67e22;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>საინჟინრო-სამშენებლო პორტალი 🏗️</h1>
    </div>

    <div class="container">
        <div class="card">
            <div id="clock">00:00:00</div>
            <img src="New DOC Document.jpg" style="width:200px; border-radius:10px;" alt="პროექტი">
        </div>

        <div class="card">
            <h3 style="color: #e67e22;">ბეტონის კალკულატორი (180₾ / მ³)</h3>
            <div class="calc-group">
                <div><label>სიგრძე (მ)</label><input type="number" id="L" value="1" oninput="calculate()"></div>
                <div><label>სიგანე (მ)</label><input type="number" id="W" value="1" oninput="calculate()"></div>
                <div><label>სისქე (მ)</label><input type="number" id="H" value="0.2" oninput="calculate()"></div>
            </div>
            <div class="result-box concrete-res">
                <p>🟦 ფართობი: <span id="sq-res" class="highlight">1.00</span> მ²</p>
                <p>📐 მოცულობა: <span id="vol-res" class="highlight">0.20</span> მ³</p>
                <p>⚖️ ცემენტი (370კგ/მ³): <span id="cem-kg-res" class="highlight" style="color: #d35400;">74.0</span> კგ
                </p>
                <h3 style="color: #c0392b; margin-top:10px;">ჯამური ფასი: <span id="price-res">36</span> ₾</h3>
            </div>
        </div>

        <div class="card">
            <h3 style="color: #3498db;">არმატების წონის კალკულატორი ⛓️</h3>
            <div class="calc-group">
                <div>
                    <label>დიამეტრი (მმ)</label>
                    <select id="dia" onchange="calculate()">
                        <option value="0.395">8 მმ</option>
                        <option value="0.617">10 მმ</option>
                        <option value="0.888" selected>12 მმ</option>
                        <option value="1.21">14 მმ</option>
                        <option value="1.58">16 მმ</option>
                        <option value="2.47">20 მმ</option>
                    </select>
                </div>
                <div>
                    <label>მთლიანი სიგრძე (მ)</label>
                    <input type="number" id="rebarL" value="10" oninput="calculate()">
                </div>
            </div>
            <div class="result-box">
                <p>⚖️ ჯამური წონა: <span id="rebar-weight" class="highlight"
                        style="font-size: 1.5em; color: #2980b9;">8.88</span> კგ</p>
                <p style="font-size: 0.9em; color: #7f8c8d;">*გამოთვლილია სტანდარტული კოეფიციენტებით</p>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function calculate() {
            // ბეტონი
            let l = parseFloat(document.getElementById('L').value) || 0;
            let w = parseFloat(document.getElementById('W').value) || 0;
            let h = parseFloat(document.getElementById('H').value) || 0;
            let area = l * w;
            let vol = area * h;
            document.getElementById('sq-res').innerText = area.toFixed(2);
            document.getElementById('vol-res').innerText = vol.toFixed(2);
            document.getElementById('cem-kg-res').innerText = (vol * 370).toFixed(1);
            document.getElementById('price-res').innerText = Math.round(vol * 180);

            // არმატება
            let coeff = parseFloat(document.getElementById('dia').value);
            let rL = parseFloat(document.getElementById('rebarL').value) || 0;
            document.getElementById('rebar-weight').innerText = (coeff * rL).toFixed(2);
        }
        window.onload = calculate;
    </script>
</body>

</html>
