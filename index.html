<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>სამშენებლო პორტალი</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            width: 95%;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        #clock {
            font-size: 24px;
            font-weight: bold;
            color: #e67e22;
            text-align: center;
            margin-bottom: 10px;
        }

        .calc-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .result-box {
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 6px solid;
        }

        .concrete-res {
            background: #fff3e0;
            border-left-color: #e67e22;
        }

        .rebar-res {
            background: #e1f5fe;
            border-left-color: #0288d1;
        }

        h3 {
            margin-top: 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>საინჟინრო-სამშენებლო პორტალი 🏗️</h1>
    </div>

    <div class="container">
        <div class="card">
            <div id="clock">00:00:00</div>
        </div>

        <div class="card">
            <h3 style="color: #e67e22;">ბეტონის კალკულატორი (180₾ / მ³)</h3>
            <div class="calc-group">
                <div><label>სიგრძე (მ)</label><input type="number" id="L" value="1" oninput="calculate()"></div>
                <div><label>სიგანე (მ)</label><input type="number" id="W" value="1" oninput="calculate()"></div>
                <div><label>სისქე (მ)</label><input type="number" id="H" value="0.2" oninput="calculate()"></div>
            </div>
            <div class="result-box concrete-res">
                <p>🟦 ფართობი: <b><span id="sq-res">1.00</span> მ²</b></p>
                <p>📐 მოცულობა: <b><span id="vol-res">0.20</span> მ³</b></p>
                <p>⚖️ ცემენტი: <b><span id="cem-kg-res">74.0</span> კგ</b></p>
                <h3 style="color: #c0392b; border:none; margin:10px 0 0 0;">ფასი: <span id="price-res">36</span> ₾</h3>
            </div>
        </div>

        <div class="card">
            <h3 style="color: #0288d1;">არმატურის კალკულატორი ⛓️</h3>
            <div class="calc-group">
                <div>
                    <label>დიამეტრი</label>
                    <select id="dia" onchange="calculate()">
                        <option value="0.395">8 მმ</option>
                        <option value="0.617">10 მმ</option>
                        <option value="0.888" selected>12 მმ</option>
                        <option value="1.21">14 მმ</option>
                        <option value="1.58">16 მმ</option>
                        <option value="2.47">20 მმ</option>
                    </select>
                </div>
                <div><label>სულ მეტრი</label><input type="number" id="rebarL" value="0" oninput="calculate()"></div>
                <div><label>სულ კილოგრამი</label><input type="number" id="rebarKG" value="0"
                        oninput="calculateReverse()"></div>
                <div><label>ტონის ფასი (₾)</label><input type="number" id="tonPrice" value="2400" oninput="calculate()">
                </div>
            </div>
            <div class="result-box rebar-res">
                <p>⚖️ წონა: <b><span id="res-weight">0.00</span> კგ</b></p>
                <p>📏 სიგრძე: <b><span id="res-len">0.00</span> მეტრი</b></p>
                <h3 style="color: #c0392b; border:none; margin:10px 0 0 0;">ღირებულება: <span id="rebar-cost">0</span> ₾
                </h3>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        function calculate() {
            // ბეტონის ლოგიკა
            let l = parseFloat(document.getElementById('L').value) || 0;
            let w = parseFloat(document.getElementById('W').value) || 0;
            let h = parseFloat(document.getElementById('H').value) || 0;
            let vol = l * w * h;
            document.getElementById('sq-res').innerText = (l * w).toFixed(2);
            document.getElementById('vol-res').innerText = vol.toFixed(2);
            document.getElementById('cem-kg-res').innerText = (vol * 370).toFixed(1);
            document.getElementById('price-res').innerText = Math.round(vol * 180);

            // არმატურის პირდაპირი გათვლა (მეტრიდან კილოგრამში)
            let coeff = parseFloat(document.getElementById('dia').value);
            let m = parseFloat(document.getElementById('rebarL').value) || 0;
            let kg = m * coeff;
            let tPrice = parseFloat(document.getElementById('tonPrice').value) || 0;

            document.getElementById('res-weight').innerText = kg.toFixed(2);
            document.getElementById('res-len').innerText = m.toFixed(2);
            document.getElementById('rebar-cost').innerText = Math.round((kg / 1000) * tPrice);
        }

        function calculateReverse() {
            let coeff = parseFloat(document.getElementById('dia').value);
            let kg = parseFloat(document.getElementById('rebarKG').value) || 0;
            let m = kg / coeff;
            let tPrice = parseFloat(document.getElementById('tonPrice').value) || 0;

            document.getElementById('res-len').innerText = m.toFixed(2);
            document.getElementById('res-weight').innerText = kg.toFixed(2);
            document.getElementById('rebarL').value = m.toFixed(2);
            document.getElementById('rebar-cost').innerText = Math.round((kg / 1000) * tPrice);
        }

        window.onload = calculate;
    </script>
</body>

</html>
