<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>ორი ნაპირი - საინჟინრო კალკულატორი</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            position: relative;
            border-top: 5px solid #2c3e50;
        }

        #clock {
            font-size: 18px;
            font-weight: bold;
            color: #e67e22;
            position: absolute;
            top: 20px;
            right: 25px;
            border: 1px solid #e67e22;
            padding: 5px 12px;
            border-radius: 6px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            font-size: 11px;
            color: #555;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .res-box {
            padding: 15px;
            border-radius: 8px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-left: 5px solid #3498db;
            margin-top: 10px;
        }

        .mat-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px dashed #ddd;
        }

        .total-line {
            font-size: 16px;
            font-weight: bold;
            color: #c0392b;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        .grand-total {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: right;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <div id="clock">00:00:00</div>
            <div class="logo-section">
                <h2>საინჟინრო კალკულატორი</h2>
            </div>
        </div>

        <div class="card no-print">
            <h3 style="color:#2980b9; margin-top:0;">🔗 არმატურა</h3>
            <div class="grid">
                <div><label>დიამეტრი (Ø)</label>
                    <select id="rDia" onchange="calc()">
                        <option value="0.222">6 მმ</option>
                        <option value="0.395">8 მმ</option>
                        <option value="0.617">10 მმ</option>
                        <option value="0.888" selected>12 მმ</option>
                        <option value="1.21">14 მმ</option>
                        <option value="1.58">16 მმ</option>
                        <option value="2.47">20 მმ</option>
                        <option value="3.85">25 მმ</option>
                    </select>
                </div>
                <div><label>წონა (კგ)</label><input type="number" id="rKG" value="1000" oninput="calc()"></div>
                <div><label>ტონის ფასი (₾)</label><input type="number" id="rPrice" value="2400" oninput="calc()"></div>
            </div>
            <div class="res-box" style="border-left-color: #2980b9;">
                <div class="mat-row"><span>სიგრძე: <span id="rLen">0</span> მ.</span></div>
                <div class="total-line">
                    <span>ჯამი: <span id="rSum">0</span> ₾</span>
                    <button class="add-btn" style="background:#2980b9"
                        onclick="add('არმატურა', 'rKG', 'rSum', '0', 'კგ')">დამატება</button>
                </div>
            </div>
        </div>

        <div class="card no-print">
            <h3 style="color:#e67e22; margin-top:0;">⚪ ბეტონი</h3>
            <div class="grid">
                <div><label>მოცულობა (მ³)</label><input type="number" id="cV" value="1" oninput="calc()"></div>
                <div><label>მარკა</label>
                    <select id="cMark" onchange="calc()">
                        <option value="220" data-sand="800" data-grav="1100">M100</option>
                        <option value="250" data-sand="750" data-grav="1150">M150</option>
                        <option value="300" data-sand="700" data-grav="1200">M200</option>
                        <option value="350" data-sand="650" data-grav="1250">M250</option>
                        <option value="400" data-sand="600" data-grav="1300" selected>M300</option>
                        <option value="450" data-sand="550" data-grav="1350">M350</option>
                    </select>
                </div>
                <div><label>ხელობა (1მ³)</label><input type="number" id="cWP" value="170" oninput="calc()"></div>
            </div>
            <div class="res-box" style="border-left-color: #e67e22;">
                <div class="mat-row"><span>ცემენტი: <span id="c_cem">0</span> კგ | ქვიშა: <span id="c_sand">0</span>
                        კგ</span></div>
                <div class="mat-row"><span>ღორღი: <span id="c_grav">0</span> კგ</span></div>
                <div class="total-line">
                    <div style="font-size: 13px;">მასალა: <span id="cMatSum">0</span> | ხელობა: <span
                            id="cWorkSum">0</span></div>
                    <button class="add-btn" style="background:#e67e22"
                        onclick="add('ბეტონი', 'cV', 'cMatSum', 'cWorkSum', 'მ³')">დამატება</button>
                </div>
            </div>
        </div>

        <div class="card no-print">
            <h3 style="color:#8e44ad; margin-top:0;">🧱 ბლოკი</h3>
            <div class="grid">
                <div><label>ფართობი (მ²)</label><input type="number" id="bS" value="10" oninput="calc()"></div>
                <div><label>ზომა</label>
                    <select id="bSize" onchange="calc()">
                        <option value="1.20">10-იანი (1.20₾)</option>
                        <option value="1.60" selected>20-იანი (1.60₾)</option>
                        <option value="2.10">30-იანი (2.10₾)</option>
                    </select>
                </div>
                <div><label>ხელობა (1 ცალი)</label><input type="number" id="bWork" value="1.50" oninput="calc()"></div>
            </div>
            <div class="res-box" style="border-left-color: #8e44ad;">
                <div class="mat-row"><span>რაოდენობა: <span id="bCount">0</span> ც</span></div>
                <div class="total-line">
                    <div style="font-size: 13px;">მასალა: <span id="bMatSum">0</span> | ხელობა: <span
                            id="bWorkSum">0</span></div>
                    <button class="add-btn" style="background:#8e44ad"
                        onclick="add('ბლოკი', 'bS', 'bMatSum', 'bWorkSum', 'მ²')">დამატება</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>📊 რეესტრი</h3>
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>სამუშაო</th>
                        <th>რაოდენობა</th>
                        <th>მასალა</th>
                        <th>ხელობა</th>
                        <th>ჯამი</th>
                        <th class="no-print"></th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
            <div class="grand-total">სულ: <span id="grand">0</span> ₾</div>
            <button class="no-print" onclick="window.print()"
                style="width:100%; padding:15px; margin-top:10px; cursor:pointer; background:#2c3e50; color:white; border:none; border-radius:6px;">ბეჭდვა</button>
        </div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
        setInterval(updateClock, 1000);

        function calc() {
            // არმატურა
            let rd = parseFloat(document.getElementById('rDia').value);
            let rk = parseFloat(document.getElementById('rKG').value) || 0;
            let rp = parseFloat(document.getElementById('rPrice').value) || 0;
            document.getElementById('rLen').innerText = (rk / rd).toFixed(1);
            document.getElementById('rSum').innerText = Math.round((rk / 1000) * rp);

            // ბეტონი
            let cv = parseFloat(document.getElementById('cV').value) || 0;
            let cS = document.getElementById('cMark');
            let sel = cS.options[cS.selectedIndex];
            let cK = parseFloat(sel.value), sK = parseFloat(sel.getAttribute('data-sand')), gK = parseFloat(sel.getAttribute('data-grav'));
            document.getElementById('c_cem').innerText = Math.round(cv * cK);
            document.getElementById('c_sand').innerText = Math.round(cv * sK);
            document.getElementById('c_grav').innerText = Math.round(cv * gK);
            document.getElementById('cMatSum').innerText = Math.round(cv * ((cK * 0.32) + (sK * 0.06) + (gK * 0.032)));
            document.getElementById('cWorkSum').innerText = Math.round(cv * parseFloat(document.getElementById('cWP').value));

            // ბლოკი
            let bs = parseFloat(document.getElementById('bS').value) || 0;
            let bc = Math.ceil(bs * 12.5);
            document.getElementById('bCount').innerText = bc;
            document.getElementById('bMatSum').innerText = Math.round(bc * parseFloat(document.getElementById('bSize').value));
            document.getElementById('bWorkSum').innerText = Math.round(bc * parseFloat(document.getElementById('bWork').value));
        }

        function add(name, qtyId, matSumId, workSumId, unit) {
            let q = document.getElementById(qtyId).value;
            let m = parseInt(document.getElementById(matSumId).innerText) || 0;
            let w = parseInt(document.getElementById(workSumId).innerText) || 0;
            document.getElementById('list').innerHTML += `<tr><td><b>${name}</b></td><td>${q} ${unit}</td><td>${m} ₾</td><td>${w} ₾</td><td><b>${m + w} ₾</b></td><td class="no-print" onclick="this.parentElement.remove(); updateTotals();" style="color:red; cursor:pointer;">✕</td></tr>`;
            updateTotals();
        }

        function updateTotals() {
            let rows = document.getElementById('list').rows;
            let sum = 0;
            for (let i = 0; i < rows.length; i++) sum += parseInt(rows[i].cells[4].innerText);
            document.getElementById('grand').innerText = sum;
        }
        window.onload = calc;
    </script>
</body>

</html>
